repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.4
    hooks:
      - id: ruff-check
        args: ['--fix', '--exclude', 'lib']
        # Run ruff with --fix to auto-correct fixable issues before commit
      - id: ruff-format
        args: ['--exclude', 'lib']
        # This formats imports and code style, run after ruff-check
